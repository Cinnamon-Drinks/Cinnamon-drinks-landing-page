about:
  heading: Sobre
  body: |
    Desde 2018, a Cinnamon é referência em coquetelaria de alto padrão,
    oferecendo soluções completas de bar para eventos como casamentos,
    formaturas e recepções exclusivas.

    Fundada por Roger, com mais de 16 anos de experiência, a empresa se
    destaca pela equipe altamente qualificada certificada por Moisés Barros.
  foundedYear: 2018
  mainPhoto: /uploads/foto-sobre.png
